name: CI

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate model artifact
        run: |
          python model/train.py

      - name: Run tests
        run: |
          python -m pytest -q

  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image (latest + sha + tag when present)
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/ml-inference-api
        run: |
          TAGS="-t $IMAGE:latest -t $IMAGE:${{ github.sha }}"

          # If this run is triggered by a git tag (e.g. v1.0.0), also push that tag
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            TAGS="$TAGS -t $IMAGE:$TAG_NAME"
          fi

          docker build $TAGS .

          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            docker push $IMAGE:$TAG_NAME
          fi