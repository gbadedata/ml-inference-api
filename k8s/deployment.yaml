apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-inference-api
  labels:
    app: ml-inference-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-inference-api
  template:
    metadata:
      labels:
        app: ml-inference-api
    spec:
      containers:
        - name: ml-inference-api
          image: ghcr.io/gbadedata/ml-inference-api:v1.0.1
          ports:
            - containerPort: 8000
          env:
            - name: APP_NAME
              value: "ML Inference API"
            - name: APP_VERSION
              value: "1.0.1"
            - name: LOG_LEVEL
              value: "INFO"
            - name: MODEL_PATH
              value: "model/artifact/model.json"